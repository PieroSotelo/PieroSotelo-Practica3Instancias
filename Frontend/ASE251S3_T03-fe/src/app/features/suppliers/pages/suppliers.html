<div class="dashboard-container">
  <header class="page-header">
    <h2>Gestión de Proveedores</h2>
    <button *ngIf="!isFormOpen" class="btn btn-primary" (click)="openForm()">
      Nuevo Proveedor
    </button>
  </header>

  <main class="page-content">
    <div *ngIf="isFormOpen" class="form-section animate-fade-in">
      <div class="section-card">
        <div class="card-header">
          <h3>{{ editingSupplierId ? 'Editar Proveedor' : 'Registrar Proveedor' }}</h3>
          <button class="btn-close" (click)="closeForm()">&times;</button>
        </div>
        <app-supplier-form 
          [supplierId]="editingSupplierId" 
          (onSave)="onSupplierSaved()"
          (onCancel)="closeForm()">
        </app-supplier-form>
      </div>
    </div>

    <!-- Botón para recargar la lista -->
    <div class="list-actions">
      <button class="btn btn-list" (click)="loadSuppliers()">
        Listar proveedores
      </button>
    </div>

    <div class="list-section">
      <app-supplier-list 
        [suppliers]="suppliers" 
        (onEdit)="openForm($event)" 
        (onDelete)="deleteSupplier($event)" 
        (onRestore)="restoreSupplier($event)">
      </app-supplier-list>
    </div>
  </main>
</div>
