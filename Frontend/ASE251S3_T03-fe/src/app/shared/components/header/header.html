<!-- Header global de la aplicación -->
 <header class="header">
    <div class="header-content">

        <!-- Titulo del sistema -->
         <div class="header-text">
            <h1>{{ title }}</h1>
            <p>{{ subtitle }}</p>
         </div>

         <!--Botón atrás-->
         <button *ngIf="showBackButton" class="btn-back" (click)="goBack()">
            ← Atrás
         </button>
    </div>
 </header>
